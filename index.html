<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ứng dụng nghe nhạc trực tuyến phong cách Spotify">
    <title>Nghe nhạc</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/modal.css">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/qvjz8QFW/Logo.png" />
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <i class="fa-brands fa-spotify"></i>
                <span>Spotify</span>
            </div>
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Bạn muốn nghe gì?">
            </div>
        </header>
        <main class="main-content">

            <section class="content-section" id="view-home">
                <h1 id="greeting"></h1>
                <div class="song-grid" id="song-list">
                </div>
                <div class="load-more-container" id="load-more-container">
                    <button id="btn-load-more" class="load-more-btn">Xem thêm</button>
                </div>
            </section>
        </main>

        <footer class="player-bar">
            <div class="current-track">
                <div class="track-img">
                    <img id="player-img" src="style/img/4MuaThuongEm.jpg" alt="Track thumbnail">
                </div>
                <div class="track-info">
                    <div id="player-title" class="track-name">Chọn một bài hát</div>
                    <div id="player-artist" class="track-artist">Nghệ sĩ</div>
                </div>
            </div>

            <div class="player-controls">
                <div class="control-buttons">
                    <button id="btn-shuffle" class="btn-icon" title="Trộn bài"><i class="fa-solid fa-shuffle"></i></button>
                    <button id="btn-prev" class="btn-icon"><i class="fa-solid fa-backward-step"></i></button>
                    <button id="btn-play-pause" class="btn-play"><i class="fa-solid fa-play"></i></button>
                    <button id="btn-next" class="btn-icon"><i class="fa-solid fa-forward-step"></i></button>
                    <button id="btn-repeat" class="btn-icon" title="Lặp lại"><i class="fa-solid fa-repeat"></i></button>
                </div>
                <div class="progress-bar-container">
                    <span id="current-time">0:00</span>
                    <div class="progress-bar" id="progress-container">
                        <div class="progress-filled" id="progress-indicator"></div>
                    </div>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="extra-controls">
                <i class="fa-solid fa-volume-high"></i>
                <div class="volume-bar" id="volume-container">
                    <div class="volume-filled" id="volume-indicator" style="width: 80%;"></div>
                </div>
            </div>
        </footer>
    </div>

    <div id="playing-modal" class="modal">
        <div id="modal-bg" class="modal-bg"></div>
        <div class="modal-content">
            <button id="btn-close-modal" class="close-btn"><i class="fa-solid fa-chevron-down"></i></button>
            <button id="btn-scroll-top" class="scroll-top-btn"><i class="fa-solid fa-arrow-up"></i></button>
            <div class="modal-body">
                <div class="modal-left">
                    <div class="disc-wrapper">
                        <div class="disc-container" id="disc-container">
                            <img id="modal-disc-img" src="" alt="Disc" class="disc-img">
                            <div class="disc-center"></div>
                        </div>
                    </div>
                    <div class="modal-track-info">
                        <h2 id="modal-title">Tiêu đề</h2>
                        <p id="modal-artist">Nghệ sĩ</p>
                        
                        <div class="modal-player-controls">
                            <div class="control-buttons">
                                <button id="modal-btn-shuffle" class="btn-icon" title="Trộn bài"><i class="fa-solid fa-shuffle"></i></button>
                                <button id="modal-btn-prev" class="btn-icon"><i class="fa-solid fa-backward-step"></i></button>
                                <button id="modal-btn-play-pause" class="btn-play"><i class="fa-solid fa-play"></i></button>
                                <button id="modal-btn-next" class="btn-icon"><i class="fa-solid fa-forward-step"></i></button>
                                <button id="modal-btn-repeat" class="btn-icon" title="Lặp lại"><i class="fa-solid fa-repeat"></i></button>
                            </div>
                            <div class="progress-bar-container">
                                <span id="modal-current-time">0:00</span>
                                <div class="progress-bar" id="modal-progress-container">
                                    <div class="progress-filled" id="modal-progress-indicator"></div>
                                </div>
                                <span id="modal-duration">0:00</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-right">
                    <h3>Danh sách phát tiếp theo</h3>
                    <div id="queue-list" class="queue-list">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="main-audio" src=""></audio>

    <script src="style/script.js"></script>
</body>
</html>
